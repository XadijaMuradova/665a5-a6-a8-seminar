name: Academic CI-CD from File

on: [push]

jobs:
  Analiz_ve_Hesabat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Calculate and Create Report
        run: |
          # Balları oxu və hesabla
          BALLAR=$(cat ballar.txt)
          SURET=0
          SAY=0
          A_SAYI=0
          
          for i in $BALLAR; do
            SURET=$((SURET + i))
            SAY=$((SAY + 1))
            if [ $i -ge 91 ]; then
              A_SAYI=$((A_SAYI + 1))
            fi
          done
          
          ORTA=$((SURET / SAY))
          
          if [ $ORTA -ge 91 ] && [ $A_SAYI -eq $SAY ]; then
            STATUS="ELACI"
          elif [ $ORTA -ge 71 ]; then
            STATUS="ZERBECI"
          elif [ $ORTA -ge 51 ]; then
            STATUS="ADI"
          else
            STATUS="KESR"
          fi
          
          # Hesabatı birbaşa burada yarat
          echo "Ortalama: $ORTA" > report.txt
          echo "Status: $STATUS" >> report.txt
          
      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: Final-Results
          path: report.txt
