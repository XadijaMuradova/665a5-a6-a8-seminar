name: Natural Number Test System

on: [push]

jobs:
  test_logic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Yoxlama Merhelesi (test_ededler.txt)
        run: |
          if [ ! -f test_ededler.txt ]; then
            echo "XETA: test_ededler.txt tapilmadi!"
            exit 1
          fi

          for n in $(cat test_ededler.txt); do
            if [[ ! "$n" =~ ^[0-9]+$ ]] || [ "$n" -eq 0 ]; then
              echo "XETA: '$n' natural eded deyil!"
              exit 1
            fi
          done

      - name: Tek ve Cut Ayirici
        if: success()
        run: |
          echo "Tekler:"
          awk '$1 % 2 != 0' test_ededler.txt
          echo "Cutler:"
          awk '$1 % 2 == 0' test_ededler.txt
